<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matheus Personal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-wrap">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <div class="date-nav">
          <button class="nav-day-btn" id="prev-day">‹</button>
          <div class="header-center">
            <div class="header-name">Matheus</div>
            <div class="header-date" id="header-date"></div>
          </div>
          <button class="nav-day-btn" id="next-day">›</button>
        </div>
        <div class="header-right">
          <button class="btn-goto-today" id="btn-goto-today" style="display:none">Hoje</button>
          <span class="level-badge" id="level-badge">Iniciante</span>
          <button class="btn-logout" id="btn-logout">Sair</button>
        </div>
      </div>
      <div class="xp-row">
        <span class="xp-label" id="xp-label">0 XP</span>
        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill" style="width:0%"></div>
        </div>
        <span class="save-status" id="save-status"></span>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="hoje">Hoje</button>
      <button class="tab-btn" data-tab="comida">Comida</button>
      <button class="tab-btn" data-tab="treino">Treino</button>
      <button class="tab-btn" data-tab="semana">Semana</button>
    </nav>

    <!-- Tab: Hoje -->
    <section class="tab-content active" id="tab-hoje">
      <!-- Renderizado por app.js -->
    </section>

    <!-- Tab: Comida -->
    <section class="tab-content" id="tab-comida">
      <!-- Renderizado por app.js -->
    </section>

    <!-- Tab: Treino -->
    <section class="tab-content" id="tab-treino">
      <!-- Renderizado por app.js -->
    </section>

    <!-- Tab: Semana -->
    <section class="tab-content" id="tab-semana">
      <!-- Renderizado por app.js -->
    </section>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="hoje">
      <span class="nav-icon">📋</span>
      <span>Hoje</span>
    </button>
    <button class="nav-btn" data-tab="comida">
      <span class="nav-icon">🍽️</span>
      <span>Comida</span>
    </button>
    <button class="nav-btn" data-tab="treino">
      <span class="nav-icon">💪</span>
      <span>Treino</span>
    </button>
    <button class="nav-btn" data-tab="semana">
      <span class="nav-icon">📅</span>
      <span>Semana</span>
    </button>
  </nav>

  <!-- XP Toast -->
  <div class="xp-toast" id="xp-toast"></div>

  <!-- Modal: Adicionar/Editar bloco customizado -->
  <div class="modal-overlay" id="block-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Novo item</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>

      <div class="field">
        <label>Emoji</label>
        <input type="text" id="block-emoji" placeholder="⭐" maxlength="4" class="emoji-input">
      </div>

      <div class="field">
        <label>Título</label>
        <input type="text" id="block-name" placeholder="Ex: Alongamento">
      </div>

      <div class="field">
        <label>XP ao completar</label>
        <input type="number" id="block-xp" value="5" min="1" max="99" class="xp-input">
      </div>

      <div class="field">
        <label>Dias da semana</label>
        <div class="day-picker" id="day-picker"></div>
      </div>

      <button class="btn-primary" id="modal-save">Salvar item</button>
      <button class="btn-delete" id="modal-delete">Excluir item</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
