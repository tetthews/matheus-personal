<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Matheus Personal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">MP</div>
    <div class="auth-sub">Personal tracker</div>

    <h2 id="form-title">Entrar</h2>

    <div id="msg" class="msg error"></div>

    <form id="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="field" id="pass-wrap">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="btn-submit">Entrar</button>
    </form>

    <div class="auth-footer" style="margin-top:10px">
      <a href="#" id="forgot-link">Esqueci minha senha</a>
    </div>

    <div class="auth-footer" style="margin-top:14px">
      <a href="#" id="toggle-mode">Criar conta</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
